name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go run github.com/playwright-community/playwright-go/cmd/playwright install --with-deps --only-shell chromium
      - run: go test ./...
      - run: go build -o irongate .
