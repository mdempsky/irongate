name: CD

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: |
          GOOS=linux GOARCH=amd64 go build -o irongate .
          zip irongate-linux-amd64.zip irongate
          GOOS=linux GOARCH=arm64 go build -o irongate .
          zip irongate-linux-arm64.zip irongate
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            irongate-linux-amd64.zip
            irongate-linux-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
